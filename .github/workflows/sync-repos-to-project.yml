name: Sync Access To Repos to Project

# Trigger manually or on schedule
on:
  workflow_dispatch:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'

permissions:
  contents: read

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Add repos to project
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_NUMBER: 1
          OWNER: dougdevitre
        run: |
          # Array of Access To repositories
          declare -a REPOS=(
            "access-to"
            "access-to-housing"
            "access-to-jobs"
            "access-to-health"
            "access-to-business"
            "access-to-services"
            "access-to-education"
            "access-to-safety"
          )

          # Get project ID from project number
          PROJECT_ID=$(gh project list --owner $OWNER --format json | \
            jq --arg num "$PROJECT_NUMBER" '.[] | select(.number == ($num | tonumber)) | .id' | \
            head -1)

          if [ -z "$PROJECT_ID" ]; then
            echo "❌ Project $PROJECT_NUMBER not found"
            exit 1
          fi

          echo "📋 Found project ID: $PROJECT_ID"

          # Add each repository to the project
          for REPO in "${REPOS[@]}"; do
            REPO_URL="https://github.com/$OWNER/$REPO"
            echo "🔗 Adding $REPO..."

            # Add item to project
            gh project item-add $PROJECT_NUMBER \
              --owner $OWNER \
              --url "$REPO_URL" 2>/dev/null && \
              echo "✅ Added $REPO" || \
              echo "⚠️  $REPO already in project or error occurred"
          done

          echo "✨ Sync complete!"
