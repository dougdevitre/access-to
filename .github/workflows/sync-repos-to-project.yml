name: Sync Access To Repos to Project

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'GitHub Project number'
        required: true
        default: '1'
      owner:
        description: 'GitHub owner/org'
        required: true
        default: 'dougdevitre'
  schedule:
    - cron: '0 9 * * *'

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repos to project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          chmod +x .github/scripts/sync-repos.sh
          .github/scripts/sync-repos.sh \
            .github/config/repos.json \
            "${{ inputs.project_number || '1' }}" \
            "${{ inputs.owner || 'dougdevitre' }}"
