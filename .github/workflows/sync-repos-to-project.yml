name: Sync Access To Repos to Project

on:
  workflow_dispatch:
    inputs:
      project_number:
        description: 'GitHub Project number'
        required: true
        default: '1'
      owner:
        description: 'GitHub owner/org'
        required: true
        default: 'dougdevitre'
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Add repos to project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          PROJECT_NUMBER: ${{ inputs.project_number || '1' }}
          OWNER: ${{ inputs.owner || 'dougdevitre' }}
        run: |
          declare -a REPOS=(
            "access-to"
            "access-to-housing"
            "access-to-jobs"
            "access-to-health"
            "access-to-business"
            "access-to-services"
            "access-to-education"
            "access-to-safety"
          )

          # Get project ID from project number
          PROJECT_ID=$(gh project list --owner "$OWNER" --format json | \
            jq -r --arg num "$PROJECT_NUMBER" '.[] | select(.number == ($num | tonumber)) | .id' | \
            head -1)

          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Project $PROJECT_NUMBER not found for owner $OWNER"
            exit 1
          fi

          echo "Found project ID: $PROJECT_ID"

          ADDED=0
          SKIPPED=0
          FAILED=0

          for REPO in "${REPOS[@]}"; do
            REPO_URL="https://github.com/$OWNER/$REPO"
            echo "Adding $REPO..."

            if OUTPUT=$(gh project item-add "$PROJECT_NUMBER" \
              --owner "$OWNER" \
              --url "$REPO_URL" 2>&1); then
              echo "  Added $REPO"
              ((ADDED++))
            else
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "  Skipped $REPO (already in project)"
                ((SKIPPED++))
              else
                echo "::warning::Failed to add $REPO: $OUTPUT"
                ((FAILED++))
              fi
            fi
          done

          # Write job summary
          {
            echo "## Repo Sync Results"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Added | $ADDED |"
            echo "| Skipped (already in project) | $SKIPPED |"
            echo "| Failed | $FAILED |"
            echo ""
            echo "**Total repos:** ${#REPOS[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED repo(s) failed to sync"
            exit 1
          fi
